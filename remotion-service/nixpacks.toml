# Railway/Nixpacks — Remotion דורש Chromium ו-ffmpeg עבור הרינדור.
# בנוסף נדרשות ספריות מערכת (system libraries) שדפדפן headless תלוי בהן —
# בלעדיהן הדפדפן נכשל עם "error while loading shared libraries: libglib-2.0.so.0".
[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "chromium"]
nixLibs = [
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "at-spi2-core",
  "cups",
  "dbus",
  "libdrm",
  "expat",
  "libxkbcommon",
  "mesa",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "pango",
  "cairo",
  "alsa-lib",
  "gtk3",
  "gdk-pixbuf"
]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node server.js"

[variables]
# Remotion ישתמש ב-Chromium שמותקן ע"י Nix במקום להוריד אחד משלו
REMOTION_CHROME_EXECUTABLE = "/root/.nix-profile/bin/chromium"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"